global:
  namespace: Development
  env_name: dev

server:
  app: timespace
  server: capsule
  service:
    - name: trpc.timespace.capsule.http
      ip: 0.0.0.0
      port: 8080
      network: tcp
      protocol: http_no_protocol
      timeout: 5000

client:
  service:
    # MySQL: DSN 从环境变量读取
    - name: trpc.mysql.timespace.default
      target: ip://${MYSQL_DSN}
      network: tcp
      timeout: 3000
    # Redis: 地址从环境变量读取
    - name: trpc.redis.timespace.default
      target: ip://${REDIS_ADDR}?db=${REDIS_DB}&password=${REDIS_PASSWORD}
      network: tcp
      timeout: 1000

plugins:
  log:
    default:
      - writer: console
        level: debug
        formatter: console
      - writer: file
        level: info
        formatter: json
        writer_config:
          filename: ./logs/timespace.log
          max_size: 100
          max_backups: 10
          max_age: 30
          compress: false
  # 业务自定义配置，敏感信息从环境变量获取
  custom:
    timespace:
      wechat:
        app_id: ${WECHAT_APP_ID}
        app_secret: ${WECHAT_APP_SECRET}
      jwt:
        secret: ${JWT_SECRET}
        expire_hours: 168
      upload:
        max_size: 10485760
        allowed_types:
          - "image/jpeg"
          - "image/png"
          - "image/gif"
          - "image/webp"
        save_path: "./uploads"
        url_prefix: "/static/uploads"
      geo:
        nearby_radius: 50
        search_radius: 5000
